<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{page_title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f3ede2">
  <link rel="canonical" href="{{canonical}}">
  <meta property="og:title" content="{{page_title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:image" content="https://prestonmantel.com/img/preston-mantel-social.png">
  <meta property="og:image:width" content="1600">
  <meta property="og:image:height" content="1000">
  <meta property="og:image:alt" content="Preston Mantel, finance researcher studying markets as engineered systems">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{page_title}}">
  <meta name="twitter:description" content="{{description}}">
  <meta name="twitter:image" content="https://prestonmantel.com/img/preston-mantel-social.png">
  <link rel="icon" href="img/headshot.jpg" type="image/jpeg">
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') document.documentElement.dataset.theme = saved;
    }());
  </script>
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">{{structured_data}}</script>
</head>
<body data-page="{{page_id}}">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-name" href="index.html" aria-label="{{name}} home">
        <span>Preston Mantel</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">{{nav_html}}</nav>
      <button class="theme-toggle" type="button" aria-label="Change color theme" aria-pressed="false">
        <span class="theme-icon" aria-hidden="true">◐</span>
        <span class="theme-label">Theme</span>
      </button>
    </div>
  </header>

  <main id="main-content" class="site-main">{{content_html}}</main>

  <footer class="site-footer">
    <div class="footer-lead">
      <p class="eyebrow">Get in touch</p>
      <p>Research, teaching, or market design.</p>
    </div>
    <div class="footer-links">{{profile_links_html}}</div>
    <p class="copyright">© {{year}} Preston Mantel</p>
  </footer>
  <script src="js/site.js"></script>
</body>
</html>
