hero_headline: Markets are engineered systems.
hero_intro: >-
  I came to market microstructure through mechanical engineering. I study how
  the design of trading systems and market rules shapes liquidity, execution,
  and costs for investors.
tagline: >-
  I study market microstructure, retail order routing, market design,
  and liquidity, with a focus on how market rules shape trading costs
  for everyday investors.
