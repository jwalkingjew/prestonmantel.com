- id: collaring
  title: "Democratizing or Demoralizing: Impact of Robinhood on Costs and Volatility"
  authors: [Preston Mantel, Mehmet Sağlam]
  status: under_review
  date: 2025-11
  ssrn: "4377192"
  abstract: ""            # pending: Preston to paste verbatim from SSRN
  abstract_verified: null
  bullets:
    - Studies how Robinhood's order-collaring mechanism affects retail trading costs and volatility.
    - Uses regular hours and after-hours trades to identify the impact of market order collaring.
    - Finds increased retail trading costs of approximately 2 basis points, or over $2 billion in 2020.
  presentations:
    - Financial Management Association Annual Meeting, Chicago (2023)
    - The Microstructure Exchange, Stockholm (2023)
    - Southern Finance Association Annual Meeting (2024)
  awards:
